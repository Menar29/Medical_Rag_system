version: "3.9"

services:
  # ── Ollama (Gemma 4 LLM) ──────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: cerviscan_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    restart: unless-stopped
    # Pull the model on first start
    entrypoint: >
      sh -c "ollama serve &
             sleep 5 &&
             ollama pull gemma4 &&
             wait"

  # ── CerviScan AI Backend (FastAPI) ────────────────────────────
  backend:
    build: .
    container_name: cerviscan_backend
    env_file:
      - .env
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - DB_PATH=/app/app/db/cerviscan.sqlite
      - API_KEY=${API_KEY:-changeme}
    volumes:
      - ./uploads:/app/uploads
      - ./data:/app/data
      - ./app/db:/app/app/db
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Frontend (Vite / Node) ────────────────────────────────────
  frontend:
    image: node:20-alpine
    container_name: cerviscan_frontend
    working_dir: /app
    volumes:
      - ./medimind-ai-main:/app
    ports:
      - "8080:8080"
    environment:
      - VITE_API_BASE=http://localhost:8000/api/v1
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 8080"
    depends_on:
      - backend

volumes:
  ollama_data:
